spring.application.name=assetflow-backend

# --- Database (defaults to local Postgres; override via env vars in real deployments) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/assetflow}
spring.datasource.username=${DB_USERNAME:assetflow}
spring.datasource.password=${DB_PASSWORD:assetflow}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Flyway owns schema evolution (see db/migration/V1__init.sql), so Hibernate should not auto-generate DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT (consumed by config/JwtConfig.java) ---
jwt.secret=${JWT_SECRET:change-this-secret-in-production-please-32bytes+}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=${PORT:8080}
