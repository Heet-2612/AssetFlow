spring.application.name=assetflow-backend

# --- Database (defaults to local Postgres; override via env vars in real deployments) ---
spring.datasource.url=jdbc:mysql://localhost:3306/assetflow
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT (consumed by config/JwtConfig.java) ---
jwt.secret=${JWT_SECRET:change-this-secret-in-production-please-32bytes+}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=${PORT:8080}
